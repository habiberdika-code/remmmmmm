<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Wiring Diagram Motor (Realistis + Terminal)</title>

<style>
/* AKI REALISTIS */
.aki-real {
    width: 140px;
    height: 100px;
    background: transparent;
    border: none;
}

.aki-body {
    width: 140px;
    height: 100px;
    background: #111;
    border-radius: 8px;
    position: relative;
    box-shadow: 0 0 10px #000 inset;
}

/* Tutup aki */
.aki-top {
    width: 100%;
    height: 20px;
    background: #333;
    position: absolute;
    top: 0;
    border-radius: 8px 8px 0 0;
}

/* Terminal posisi */
.aki-pos {
    position: absolute;
    top: -8px;
    left: 20px;
}

.aki-neg {
    position: absolute;
    top: -8px;
    right: 20px;
}

/* Label */
.aki-label-pos {
    position: absolute;
    top: -25px;
    left: 22px;
    color: red;
    font-weight: bold;
}

.aki-label-neg {
    position: absolute;
    top: -25px;
    right: 22px;
    color: white;
    font-weight: bold;
}

/* Tulisan aki */
.aki-text {
    position: absolute;
    bottom: 10px;
    left: 45px;
    font-size: 14px;
    color: #ccc;
}

.container {
    position: relative;
    width: 1200px;
    height: 600px;
    margin: auto;
    background: #2c2c3f;
    border-radius: 12px;
}

/* Komponen */
.box {
    position: absolute;
    background: #3a3a50;
    border: 2px solid #777;
    border-radius: 10px;
    padding: 10px;
}

/* Posisi */
#aki { left: 50px; top: 250px; width: 120px; }
#sekring { left: 250px; top: 250px; width: 120px; }
#kunci { left: 450px; top: 250px; width: 140px; }
#saklar { left: 700px; top: 150px; width: 140px; }
#lampu { left: 950px; top: 250px; width: 120px; }

/* Terminal */
.terminal {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin: 5px;
    cursor: pointer;
    display: inline-block;
}

/* Warna terminal */
.pos { background: red; }
.neg { background: black; }
.netral { background: orange; }

/* Label */
.label {
    font-size: 12px;
}

/* Lampu */
.bohlam {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #111;
    margin: auto;
}

/* Kabel */
svg {
    position: absolute;
    top: 0;
    left: 0;
}

line {
    stroke: #aaa;
    stroke-width: 3;
}
</style>
</head>

<body>

<h2>Simulasi Wiring Diagram Sistem Lampu Rem</h2>
<p>Hubungkan terminal sesuai rangkaian motor</p>

<div class="container">

<svg id="svg" width="1200" height="600"></svg>

<!-- AKI -->
<div id="aki" class="box aki-real">
    <div class="aki-body">

        <!-- Tutup aki -->
        <div class="aki-top"></div>

        <!-- Terminal + -->
        <div class="terminal pos aki-pos" data-id="aki_pos"></div>
        <div class="label aki-label-pos">+</div>

        <!-- Terminal - -->
        <div class="terminal neg aki-neg" data-id="aki_neg"></div>
        <div class="label aki-label-neg">−</div>

        <!-- Tulisan -->
        <div class="aki-text">12V</div>

    </div>
</div>

<!-- SEKRING -->
<div id="sekring" class="box">
    ⚡ SEKRING
    <div class="label">IN</div>
    <div class="terminal netral" data-id="sekring_in"></div>
    <div class="label">OUT</div>
    <div class="terminal netral" data-id="sekring_out"></div>
</div>

<!-- KUNCI -->
<div id="kunci" class="box">
    🔑 KUNCI
    <div class="label">INPUT</div>
    <div class="terminal netral" data-id="kunci_in"></div>
    <div class="label">OUTPUT</div>
    <div class="terminal netral" data-id="kunci_out"></div>
</div>

<!-- SAKLAR -->
<div id="saklar" class="box">
    🔘 SAKLAR REM
    <div class="label">MASUK</div>
    <div class="terminal netral" data-id="saklar_in"></div>
    <div class="label">KELUAR</div>
    <div class="terminal netral" data-id="saklar_out"></div>
</div>

<!-- LAMPU -->
<div id="lampu" class="box">
    💡 LAMPU
    <div class="bohlam"></div>
    <div class="label">(+)</div>
    <div class="terminal pos" data-id="lampu_pos"></div>
    <div class="label">(-)</div>
    <div class="terminal neg" data-id="lampu_neg"></div>
</div>

</div>

<button onclick="reset()">Reset</button>

<script>
let start = null;

document.querySelectorAll(".terminal").forEach(t => {
    t.addEventListener("click", function(e) {

        let rect = e.target.getBoundingClientRect();
        let svgRect = document.getElementById("svg").getBoundingClientRect();

        let x = rect.left - svgRect.left + 8;
        let y = rect.top - svgRect.top + 8;

        if (!start) {
            start = { x, y };
        } else {
            let line = document.createElementNS("http://www.w3.org/2000/svg", "line");

            line.setAttribute("x1", start.x);
            line.setAttribute("y1", start.y);
            line.setAttribute("x2", x);
            line.setAttribute("y2", y);

            document.getElementById("svg").appendChild(line);

            start = null;
        }
    });
});

function reset() {
    document.getElementById("svg").innerHTML = "";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Wiring PRO</title>

<style>
body { margin:0; font-family:Arial; }
.container { display:flex; height:100vh; }

.sidebar {
  width:200px; background:#eee; padding:10px;
}
.item {
  background:#fff; padding:10px; margin:5px;
  border:1px solid #ccc; cursor:grab;
}

.workspace {
  flex:1; position:relative; background:#fafafa;
}

.component {
  position:absolute;
  padding:10px;
  border:1px solid #333;
  background:white;
}

.node {
  width:14px; height:14px;
  border-radius:50%;
  position:absolute;
  cursor:pointer;
}

.pos { background:red; }
.neg { background:black; }
.net { background:blue; }

.lamp-on { background:yellow; box-shadow:0 0 25px yellow; }

canvas {
  position:absolute;
  top:0; left:0;
}
</style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <div class="item" draggable="true">AKI</div>
    <div class="item" draggable="true">Lampu</div>
    <div class="item" draggable="true">Saklar</div>
  </div>

  <div class="workspace" id="workspace">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
let dragged="";
let workspace=document.getElementById("workspace");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let nodes=[];
let wires=[];
let startNode=null;

// DRAG
document.querySelectorAll('.item').forEach(i=>{
  i.ondragstart=()=>dragged=i.innerText;
});

workspace.ondragover=e=>e.preventDefault();

workspace.ondrop=e=>{
  let c=document.createElement("div");
  c.className="component";
  c.style.left=e.offsetX+"px";
  c.style.top=e.offsetY+"px";

  if(dragged==="AKI"){
    c.innerHTML="AKI";
    createNode(c,0,20,"pos");
    createNode(c,70,20,"neg");
  }

  if(dragged==="Lampu"){
    c.innerHTML="Lampu";
    createNode(c,0,20,"net");
    createNode(c,70,20,"net");
  }

  if(dragged==="Saklar"){
    c.innerHTML="Saklar";
    c.onclick=()=>{c.classList.toggle("on"); checkCircuit();}
    createNode(c,0,20,"net");
    createNode(c,70,20,"net");
  }

  workspace.appendChild(c);
};

// BUAT NODE
function createNode(parent,x,y,type){
  let n=document.createElement("div");
  n.className="node "+type;
  n.style.left=x+"px";
  n.style.top=y+"px";

  n.onclick=(e)=>{
    e.stopPropagation();

    if(!startNode){
      startNode=n;
    }else{
      wires.push({a:startNode,b:n});
      startNode=null;
      draw();
      checkCircuit();
    }
  };

  parent.appendChild(n);
  nodes.push(n);
}

// GAMBAR KABEL
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  wires.forEach(w=>{
    let r1=w.a.getBoundingClientRect();
    let r2=w.b.getBoundingClientRect();

    let color="blue";
    if(w.a.classList.contains("pos") || w.b.classList.contains("pos")) color="red";
    if(w.a.classList.contains("neg") || w.b.classList.contains("neg")) color="black";

    ctx.strokeStyle=color;
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(r1.left+7, r1.top+7);
    ctx.lineTo(r2.left+7, r2.top+7);
    ctx.stroke();
  });
}

// GRAPH (PATHFINDING)
function buildGraph(){
  let graph=new Map();

  nodes.forEach(n=>graph.set(n,[]));

  wires.forEach(w=>{
    graph.get(w.a).push(w.b);
    graph.get(w.b).push(w.a);
  });

  return graph;
}

// DFS
function hasPath(graph,start,target,visited=new Set()){
  if(start===target) return true;
  visited.add(start);

  for(let next of graph.get(start)){
    if(!visited.has(next)){
      if(hasPath(graph,next,target,visited)) return true;
    }
  }
  return false;
}

// CEK RANGKAIAN REAL
function checkCircuit(){
  let graph=buildGraph();

  let akiPlus, akiMin, lampNodes=[], saklarOn=false;

  document.querySelectorAll(".component").forEach(c=>{
    if(c.innerText.includes("AKI")){
      akiPlus=c.children[0];
      akiMin=c.children[1];
    }
    if(c.innerText.includes("Lampu")){
      lampNodes=[c.children[0], c.children[1]];
    }
    if(c.innerText.includes("Saklar") && c.classList.contains("on")){
      saklarOn=true;
    }
  });

  let lamp=document.querySelector(".component:nth-child(n)"); // ambil lampu
  let lampComp=null;

  document.querySelectorAll(".component").forEach(c=>{
    if(c.innerText.includes("Lampu")) lampComp=c;
  });

  if(!akiPlus || !akiMin || lampNodes.length<2) return;

  // CEK JALUR:
  let path1 = hasPath(graph, akiPlus, lampNodes[0]);
  let path2 = hasPath(graph, lampNodes[1], akiMin);

  if(path1 && path2 && saklarOn){
    lampComp.classList.add("lamp-on");
  }else{
    lampComp.classList.remove("lamp-on");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Wiring Diagram Motor</title>

<style>
body {
    font-family: Arial;
    background: #1f1f2e;
    color: white;
    text-align: center;
}

.container {
    position: relative;
    width: 1100px;
    height: 550px;
    margin: auto;
    background: #2b2b3c;
    border-radius: 12px;
}

/* Komponen realistis */
.komponen {
    position: absolute;
    text-align: center;
    background: #3b3b50;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid #666;
}

/* Posisi seperti motor */
#aki { left: 50px; top: 250px; }
#sekring { left: 220px; top: 250px; }
#kunci { left: 400px; top: 250px; }
#saklar { left: 600px; top: 120px; }
#lampu { left: 900px; top: 200px; }
#ground { left: 900px; top: 380px; }

/* Titik sambung */
.node {
    width: 18px;
    height: 18px;
    background: black;
    border-radius: 50%;
    margin-top: 5px;
    cursor: pointer;
}

/* Lampu */
.bohlam {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #111;
    margin: auto;
}

/* SVG kabel */
svg {
    position: absolute;
    top: 0;
    left: 0;
}

line {
    stroke: #aaa;
    stroke-width: 3;
}

.active {
    stroke: yellow;
    stroke-width: 5;
    filter: drop-shadow(0 0 5px yellow);
}
</style>
</head>

<body>

<h2>Media Pembelajaran Wiring Diagram Lampu Rem</h2>
<p>Silakan gambar sendiri jalur kabel sesuai pemahaman</p>

<div class="container">

<svg id="svg" width="1100" height="550"></svg>

<div id="aki" class="komponen">
    🔋 Aki (+)
    <div class="node" data-id="aki"></div>
</div>

<div id="sekring" class="komponen">
    ⚡ Sekring
    <div class="node" data-id="sekring"></div>
</div>

<div id="kunci" class="komponen">
    🔑 Kunci Kontak
    <div class="node" data-id="kunci"></div>
</div>

<div id="saklar" class="komponen">
    🔘 Saklar Rem
    <div class="node" data-id="saklar"></div>
</div>

<div id="lampu" class="komponen">
    💡 Lampu Rem
    <div class="bohlam"></div>
    <div class="node" data-id="lampu"></div>
</div>

<div id="ground" class="komponen">
    ⏚ Massa (-)
    <div class="node" data-id="ground"></div>
</div>

</div>

<button onclick="reset()">Reset</button>

<script>
let start = null;

document.querySelectorAll(".node").forEach(node => {
    node.addEventListener("click", function(e) {

        let rect = e.target.getBoundingClientRect();
        let svgRect = document.getElementById("svg").getBoundingClientRect();

        let x = rect.left - svgRect.left + 9;
        let y = rect.top - svgRect.top + 9;

        if (!start) {
            start = { x, y };
        } else {
            let line = document.createElementNS("http://www.w3.org/2000/svg", "line");

            line.setAttribute("x1", start.x);
            line.setAttribute("y1", start.y);
            line.setAttribute("x2", x);
            line.setAttribute("y2", y);

            document.getElementById("svg").appendChild(line);

            start = null;
        }
    });
});

function reset() {
    document.getElementById("svg").innerHTML = "";
}
</script>

</body>
</html>

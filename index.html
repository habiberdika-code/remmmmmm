<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Wiring Lampu Rem</title>

<style>
body { font-family: Arial; margin:0; }
.container { display:flex; height:100vh; }

.sidebar {
  width:200px; background:#eee; padding:10px;
}
.item {
  background:#fff; padding:10px; margin:5px;
  border:1px solid #ccc; cursor:grab;
}

.workspace {
  flex:1; position:relative; background:#fafafa;
}

.component {
  position:absolute;
  padding:10px;
  border:1px solid #333;
  background:white;
}

.node {
  width:12px; height:12px;
  background:red;
  border-radius:50%;
  position:absolute;
  cursor:pointer;
}

.node.neg { background:black; }

.lamp-on { background:yellow; box-shadow:0 0 20px yellow; }

canvas {
  position:absolute;
  top:0; left:0;
}
</style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <div class="item" draggable="true">AKI</div>
    <div class="item" draggable="true">Lampu</div>
    <div class="item" draggable="true">Saklar</div>
  </div>

  <div class="workspace" id="workspace">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
let dragged = "";
let workspace = document.getElementById("workspace");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];
let connections = [];
let startNode = null;

// DRAG
document.querySelectorAll('.item').forEach(i=>{
  i.ondragstart=()=> dragged=i.innerText;
});

workspace.ondragover=e=>e.preventDefault();

workspace.ondrop=e=>{
  let comp = document.createElement("div");
  comp.className="component";
  comp.style.left=e.offsetX+"px";
  comp.style.top=e.offsetY+"px";

  if(dragged==="AKI"){
    comp.innerHTML="AKI";
    addNode(comp,0,20,"+");
    addNode(comp,60,20,"-","neg");
  }

  if(dragged==="Lampu"){
    comp.innerHTML="Lampu";
    addNode(comp,0,20,"");
    addNode(comp,60,20,"");
  }

  if(dragged==="Saklar"){
    comp.innerHTML="Saklar";
    comp.onclick=()=> comp.classList.toggle("on");
    addNode(comp,0,20,"");
    addNode(comp,60,20,"");
  }

  workspace.appendChild(comp);
};

// TAMBAH TITIK KABEL
function addNode(parent,x,y,label,type=""){
  let n=document.createElement("div");
  n.className="node "+type;
  n.style.left=x+"px";
  n.style.top=y+"px";

  n.onclick=(e)=>{
    e.stopPropagation();

    if(!startNode){
      startNode=n;
    }else{
      connections.push({a:startNode,b:n});
      startNode=null;
      draw();
      checkCircuit();
    }
  };

  parent.appendChild(n);
  nodes.push(n);
}

// GAMBAR KABEL
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  connections.forEach(c=>{
    let r1=c.a.getBoundingClientRect();
    let r2=c.b.getBoundingClientRect();

    ctx.beginPath();
    ctx.moveTo(r1.left+6, r1.top+6);
    ctx.lineTo(r2.left+6, r2.top+6);
    ctx.stroke();
  });
}

// CEK RANGKAIAN
function checkCircuit(){
  let akiPlus=null, akiMin=null, lamp=null, saklarOn=false;

  document.querySelectorAll(".component").forEach(c=>{
    if(c.innerText.includes("AKI")){
      akiPlus=c.children[0];
      akiMin=c.children[1];
    }
    if(c.innerText.includes("Lampu")){
      lamp=c;
    }
    if(c.innerText.includes("Saklar") && c.classList.contains("on")){
      saklarOn=true;
    }
  });

  if(!akiPlus || !akiMin || !lamp) return;

  // cek sederhana: minimal ada 3 koneksi & saklar ON
  if(connections.length>=3 && saklarOn){
    lamp.classList.add("lamp-on");
  }else{
    lamp.classList.remove("lamp-on");
  }
}
</script>

</body>
</html>

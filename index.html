<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Lampu Rem</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

.container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #f2f2f2;
  padding: 10px;
}

.item {
  background: white;
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ccc;
  cursor: grab;
  border-radius: 5px;
}

.workspace {
  flex: 1;
  border: 2px dashed #ccc;
  position: relative;
}

.dragged {
  position: absolute;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 5px;
  cursor: move;
}

/* Lampu */
.lamp-off {
  background: #ddd;
}

.lamp-on {
  background: yellow;
  box-shadow: 0 0 20px yellow;
}

/* Saklar aktif */
.active {
  background: #4caf50 !important;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Komponen</h3>
    <div class="item" draggable="true">AKI</div>
    <div class="item" draggable="true">Fuse</div>
    <div class="item" draggable="true">Lampu</div>
    <div class="item" draggable="true">Saklar Rem Depan</div>
    <div class="item" draggable="true">Saklar Rem Belakang</div>
    <div class="item" draggable="true">Massa</div>
  </div>

  <!-- Workspace -->
  <div class="workspace" id="workspace"></div>

</div>

<script>
let draggedItem = null;
const workspace = document.getElementById('workspace');

let components = [];

// Drag start
document.querySelectorAll('.item').forEach(item => {
  item.addEventListener('dragstart', () => {
    draggedItem = item.innerText;
  });
});

// Allow drop
workspace.addEventListener('dragover', (e) => {
  e.preventDefault();
});

// Drop
workspace.addEventListener('drop', (e) => {
  e.preventDefault();

  const el = document.createElement('div');
  el.classList.add('dragged');
  el.innerText = draggedItem;

  el.style.left = e.offsetX + 'px';
  el.style.top = e.offsetY + 'px';

  // Tambah class khusus
  if (draggedItem === "Lampu") {
    el.classList.add("lamp-off");
  }

  if (draggedItem.includes("Saklar")) {
    el.addEventListener("click", () => {
      el.classList.toggle("active");
      checkLamp();
    });
  }

  workspace.appendChild(el);
  components.push(el);

  makeDraggable(el);
  checkLamp();
});

// Drag ulang dalam workspace
function makeDraggable(el) {
  let offsetX, offsetY, isDown = false;

  el.addEventListener('mousedown', (e) => {
    isDown = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener('mousemove', (e) => {
    if (isDown) {
      el.style.left = (e.pageX - workspace.offsetLeft - offsetX) + 'px';
      el.style.top = (e.pageY - workspace.offsetTop - offsetY) + 'px';
    }
  });

  document.addEventListener('mouseup', () => {
    isDown = false;
  });
}

// LOGIKA LAMPU
function checkLamp() {
  let hasAki = false;
  let hasLamp = false;
  let hasMassa = false;
  let switchOn = false;

  components.forEach(el => {
    if (el.innerText === "AKI") hasAki = true;
    if (el.innerText === "Lampu") hasLamp = true;
    if (el.innerText === "Massa") hasMassa = true;

    if (el.innerText.includes("Saklar") && el.classList.contains("active")) {
      switchOn = true;
    }
  });

  // Update lampu
  components.forEach(el => {
    if (el.innerText === "Lampu") {
      if (hasAki && hasLamp && hasMassa && switchOn) {
        el.classList.remove("lamp-off");
        el.classList.add("lamp-on");
      } else {
        el.classList.remove("lamp-on");
        el.classList.add("lamp-off");
      }
    }
  });
}
</script>

</body>
</html>

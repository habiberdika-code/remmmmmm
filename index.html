<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Wiring + Gambar Asli</title>

<style>
body { margin:0; font-family:Arial; overflow:hidden; }
.container { display:flex; height:100vh; }

.sidebar {
  width:200px; background:#eee; padding:10px;
}
.item {
  background:#fff; padding:10px; margin:5px;
  border:1px solid #ccc; cursor:grab;
}

.workspace {
  flex:1; position:relative; background:#f9f9f9;
}

.component {
  position:absolute;
  width:90px; height:70px;
  border-radius:10px;
  text-align:center;
  background:transparent;
  cursor:move;
}

/* GAMBAR */
.component img {
  width:70px;
  pointer-events:none;
}

/* TERMINAL */
.node {
  width:14px; height:14px;
  border-radius:50%;
  position:absolute;
}

.pos { background:red; }
.neg { background:black; }
.net { background:blue; }

.left { left:-7px; top:50%; transform:translateY(-50%); }
.right { right:-7px; top:50%; transform:translateY(-50%); }

/* LAMPU NYALA */
.lamp-on img {
  filter: drop-shadow(0 0 15px yellow);
}

/* SAKLAR */
.switch.on img {
  filter: brightness(1.5);
}

canvas {
  position:absolute;
  top:0; left:0;
}
</style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <div class="item" draggable="true">AKI</div>
    <div class="item" draggable="true">Lampu</div>
    <div class="item" draggable="true">Saklar</div>
  </div>

  <div class="workspace" id="workspace">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
let workspace = document.getElementById("workspace");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function resize(){
  canvas.width = workspace.clientWidth;
  canvas.height = workspace.clientHeight;
}
resize();
window.onresize = resize;

let dragged="";
let nodes=[], wires=[];
let drawingWire=null;
let flowOffset=0;

// DRAG SIDEBAR
document.querySelectorAll('.item').forEach(i=>{
  i.ondragstart=()=>dragged=i.innerText;
});

workspace.ondragover=e=>e.preventDefault();

workspace.ondrop=e=>{
  createComponent(dragged,e.offsetX,e.offsetY);
};

// DRAG ULANG
function makeDraggable(el){
  let offsetX, offsetY, isDown=false;

  el.onmousedown=(e)=>{
    if(e.target.classList.contains("node")) return;
    isDown=true;
    offsetX=e.offsetX;
    offsetY=e.offsetY;
  };

  document.onmousemove=(e)=>{
    if(isDown){
      el.style.left=(e.pageX-workspace.offsetLeft-offsetX)+"px";
      el.style.top=(e.pageY-workspace.offsetTop-offsetY)+"px";
    }
  };

  document.onmouseup=()=>isDown=false;
}

// CREATE COMPONENT (PAKAI GAMBAR)
function createComponent(type,x,y){
  let c=document.createElement("div");
  c.className="component";
  c.style.left=x+"px";
  c.style.top=y+"px";

  if(type==="AKI"){
    c.innerHTML='<img src="img/aki.png">';
    createNode(c,"pos","left");
    createNode(c,"neg","right");
  }

  if(type==="Lampu"){
    c.innerHTML='<img src="img/lampu.png">';
    createNode(c,"net","left");
    createNode(c,"net","right");
  }

  if(type==="Saklar"){
    c.innerHTML='<img src="img/saklar.png">';
    c.classList.add("switch");

    c.onclick=(e)=>{
      if(e.target.classList.contains("node")) return;
      c.classList.toggle("on");
    };

    createNode(c,"net","left");
    createNode(c,"net","right");
  }

  workspace.appendChild(c);
  makeDraggable(c);
}

// NODE
function createNode(parent,type,pos){
  let n=document.createElement("div");
  n.className="node "+type+" "+pos;

  n.onmousedown=(e)=>{
    e.stopPropagation();
    drawingWire={start:n,x:e.clientX,y:e.clientY};
  };

  parent.appendChild(n);
  nodes.push(n);
}

// DRAW KABEL
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let ws=workspace.getBoundingClientRect();

  wires.forEach(w=>{
    let r1=w.a.getBoundingClientRect();
    let r2=w.b.getBoundingClientRect();

    let x1=r1.left-ws.left+r1.width/2;
    let y1=r1.top-ws.top+r1.height/2;
    let x2=r2.left-ws.left+r2.width/2;
    let y2=r2.top-ws.top+r2.height/2;

    let mx=(x1+x2)/2;

    let color="blue";
    if(w.a.classList.contains("pos")||w.b.classList.contains("pos")) color="red";
    if(w.a.classList.contains("neg")||w.b.classList.contains("neg")) color="black";

    ctx.strokeStyle=color;
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.bezierCurveTo(mx,y1,mx,y2,x2,y2);
    ctx.stroke();
  });

  if(drawingWire){
    ctx.beginPath();
    ctx.moveTo(
      drawingWire.start.getBoundingClientRect().left-ws.left+7,
      drawingWire.start.getBoundingClientRect().top-ws.top+7
    );
    ctx.lineTo(drawingWire.x-ws.left,drawingWire.y-ws.top);
    ctx.strokeStyle="gray";
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

// SNAP & CONNECT
workspace.onmouseup=e=>{
  if(!drawingWire) return;

  let target=getNearestNode(e.clientX,e.clientY);

  if(target && target!==drawingWire.start){
    wires.push({a:drawingWire.start,b:target});
  }

  drawingWire=null;
};

function getNearestNode(x,y){
  let min=25, res=null;
  nodes.forEach(n=>{
    let r=n.getBoundingClientRect();
    let cx=r.left+r.width/2;
    let cy=r.top+r.height/2;
    let d=Math.hypot(cx-x,cy-y);
    if(d<min){min=d;res=n;}
  });
  return res;
}

// LOGIKA LAMPU
function buildGraph(){
  let g=new Map();
  nodes.forEach(n=>g.set(n,[]));
  wires.forEach(w=>{
    g.get(w.a).push(w.b);
    g.get(w.b).push(w.a);
  });
  return g;
}

function hasPath(g,a,b,vis=new Set()){
  if(a===b) return true;
  vis.add(a);
  for(let n of g.get(a)){
    if(!vis.has(n)){
      if(hasPath(g,n,b,vis)) return true;
    }
  }
  return false;
}

setInterval(()=>{
  let g=buildGraph();

  let akiPlus,akiMin,lampNodes=[],lampComp,saklarOn=false;

  document.querySelectorAll(".component").forEach(c=>{
    if(c.innerHTML.includes("aki.png")){
      akiPlus=c.children[1];
      akiMin=c.children[2];
    }
    if(c.innerHTML.includes("lampu.png")){
      lampNodes=[c.children[1],c.children[2]];
      lampComp=c;
    }
    if(c.classList.contains("switch") && c.classList.contains("on")){
      saklarOn=true;
    }
  });

  if(!akiPlus||!akiMin||lampNodes.length<2) return;

  let ok1=hasPath(g,akiPlus,lampNodes[0]);
  let ok2=hasPath(g,lampNodes[1],akiMin);

  if(ok1 && ok2 && saklarOn){
    lampComp.classList.add("lamp-on");
  }else{
    lampComp.classList.remove("lamp-on");
  }

},300);
</script>

</body>
</html>

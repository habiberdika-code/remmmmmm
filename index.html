<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Sistem Lampu Rem Motor (Realistis)</title>

<style>
body {
    font-family: Arial;
    background: #222;
    color: white;
    text-align: center;
}

.container {
    position: relative;
    width: 1000px;
    height: 500px;
    margin: auto;
    background: #2c2c2c;
    border-radius: 10px;
}

/* Komponen */
.box {
    position: absolute;
    padding: 10px;
    border-radius: 8px;
    background: #444;
    border: 2px solid #666;
}

#aki { left: 50px; top: 200px; }
#sekring { left: 220px; top: 200px; }
#kunci { left: 400px; top: 200px; }
#saklar { left: 580px; top: 120px; }
#lampuBox { left: 780px; top: 200px; }
#ground { left: 780px; top: 350px; }

/* Node */
.node {
    width: 15px;
    height: 15px;
    background: black;
    border-radius: 50%;
    margin-top: 5px;
    cursor: pointer;
}

/* Lampu */
.lampu {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #111;
    margin: auto;
}

.nyala {
    background: red;
    box-shadow: 0 0 25px red;
}

/* Kabel */
svg {
    position: absolute;
    top: 0;
    left: 0;
}

line {
    stroke-width: 4;
}

.merah { stroke: red; }
.hitam { stroke: black; }

.active {
    stroke: yellow !important;
    filter: drop-shadow(0 0 5px yellow);
}
</style>
</head>

<body>

<h2>Simulasi Sistem Lampu Rem Sepeda Motor</h2>
<p>Hubungkan rangkaian dengan benar seperti sistem motor nyata</p>

<div class="container">

<svg id="svg" width="1000" height="500"></svg>

<div id="aki" class="box">
    🔋 Aki (+)
    <div class="node" data-id="aki"></div>
</div>

<div id="sekring" class="box">
    ⚡ Sekring
    <div class="node" data-id="sekring"></div>
</div>

<div id="kunci" class="box">
    🔑 Kunci Kontak
    <div class="node" data-id="kunci"></div>
</div>

<div id="saklar" class="box">
    🔘 Saklar Rem
    <div class="node" data-id="saklar"></div>
</div>

<div id="lampuBox" class="box">
    💡 Lampu Rem
    <div id="lampu" class="lampu"></div>
    <div class="node" data-id="lampu"></div>
</div>

<div id="ground" class="box">
    ⏚ Massa (-)
    <div class="node" data-id="ground"></div>
</div>

</div>

<button onclick="resetSimulasi()">Reset</button>

<script>
let start = null;
let connections = [];
let lines = [];

document.querySelectorAll(".node").forEach(node => {
    node.addEventListener("click", function(e) {

        let rect = e.target.getBoundingClientRect();
        let svgRect = document.getElementById("svg").getBoundingClientRect();

        let x = rect.left - svgRect.left + 7;
        let y = rect.top - svgRect.top + 7;

        if (!start) {
            start = { id: this.dataset.id, x, y };
        } else {
            let end = { id: this.dataset.id, x, y };

            let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", start.x);
            line.setAttribute("y1", start.y);
            line.setAttribute("x2", end.x);
            line.setAttribute("y2", end.y);

            // warna kabel
            if (start.id === "ground" || end.id === "ground") {
                line.setAttribute("class", "hitam");
            } else {
                line.setAttribute("class", "merah");
            }

            document.getElementById("svg").appendChild(line);

            connections.push(start.id + "-" + end.id);
            lines.push(line);

            start = null;

            cekRangkaian();
        }
    });
});

function cekRangkaian() {
    let benar = [
        "aki-sekring",
        "sekring-kunci",
        "kunci-saklar",
        "saklar-lampu",
        "lampu-ground"
    ];

    let cocok = benar.every(r =>
        connections.includes(r) || connections.includes(r.split("-").reverse().join("-"))
    );

    if (cocok) {
        document.getElementById("lampu").classList.add("nyala");

        lines.forEach(l => l.classList.add("active"));
    }
}

function resetSimulasi() {
    start = null;
    connections = [];
    lines = [];
    document.getElementById("svg").innerHTML = "";
    document.getElementById("lampu").classList.remove("nyala");
}
</script>

</body>
</html>

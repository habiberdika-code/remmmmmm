<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi Wiring PRO FIX</title>

<style>
body { margin:0; font-family:Arial; }
.container { display:flex; height:100vh; }

.sidebar {
  width:200px; background:#eee; padding:10px;
}
.item {
  background:#fff; padding:10px; margin:5px;
  border:1px solid #ccc; cursor:grab;
}

.workspace {
  flex:1; position:relative; background:#fafafa;
}

/* COMPONENT */
.component {
  position:absolute;
  width:80px;
  height:50px;
  text-align:center;
  border:2px solid #333;
  background:white;
  border-radius:6px;
  user-select:none;
}

/* TERMINAL */
.node {
  width:14px; height:14px;
  border-radius:50%;
  position:absolute;
  cursor:pointer;
}

.pos { background:red; }
.neg { background:black; }
.net { background:blue; }

/* POSISI TERMINAL */
.left { left:-7px; top:50%; transform:translateY(-50%); }
.right { right:-7px; top:50%; transform:translateY(-50%); }

/* LAMPU */
.lamp-on {
  background:yellow;
  box-shadow:0 0 20px yellow;
}

/* SAKLAR */
.switch.on {
  background:#4caf50;
  color:white;
}

canvas {
  position:absolute;
  top:0; left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <div class="item" draggable="true">AKI</div>
    <div class="item" draggable="true">Lampu</div>
    <div class="item" draggable="true">Saklar</div>
  </div>

  <div class="workspace" id="workspace">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
let dragged="";
let workspace=document.getElementById("workspace");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=workspace.clientWidth;
  canvas.height=workspace.clientHeight;
}
resizeCanvas();
window.onresize=resizeCanvas;

let nodes=[];
let wires=[];
let startNode=null;

// DRAG
document.querySelectorAll('.item').forEach(i=>{
  i.ondragstart=()=>dragged=i.innerText;
});

workspace.ondragover=e=>e.preventDefault();

workspace.ondrop=e=>{
  let c=document.createElement("div");
  c.className="component";
  c.style.left=e.offsetX+"px";
  c.style.top=e.offsetY+"px";

  if(dragged==="AKI"){
    c.innerHTML="🔋 AKI";
    createNode(c,"pos","left");
    createNode(c,"neg","right");
  }

  if(dragged==="Lampu"){
    c.innerHTML="💡 Lampu";
    createNode(c,"net","left");
    createNode(c,"net","right");
  }

  if(dragged==="Saklar"){
    c.innerHTML="⏻ Saklar";
    c.classList.add("switch");

    c.onclick=(e)=>{
      if(e.target.classList.contains("node")) return;
      c.classList.toggle("on");
      checkCircuit();
    };

    createNode(c,"net","left");
    createNode(c,"net","right");
  }

  workspace.appendChild(c);
};

// NODE
function createNode(parent,type,pos){
  let n=document.createElement("div");
  n.className="node "+type+" "+pos;

  n.onclick=(e)=>{
    e.stopPropagation();

    if(!startNode){
      startNode=n;
    }else{
      wires.push({a:startNode,b:n});
      startNode=null;
      draw();
      checkCircuit();
    }
  };

  parent.appendChild(n);
  nodes.push(n);
}

// GAMBAR KABEL (FIX POSISI)
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  wires.forEach(w=>{
    let r1=w.a.getBoundingClientRect();
    let r2=w.b.getBoundingClientRect();
    let ws=workspace.getBoundingClientRect();

    let x1=r1.left - ws.left + r1.width/2;
    let y1=r1.top - ws.top + r1.height/2;

    let x2=r2.left - ws.left + r2.width/2;
    let y2=r2.top - ws.top + r2.height/2;

    let color="blue";
    if(w.a.classList.contains("pos") || w.b.classList.contains("pos")) color="red";
    if(w.a.classList.contains("neg") || w.b.classList.contains("neg")) color="black";

    ctx.strokeStyle=color;
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  });
}

// GRAPH
function buildGraph(){
  let g=new Map();
  nodes.forEach(n=>g.set(n,[]));
  wires.forEach(w=>{
    g.get(w.a).push(w.b);
    g.get(w.b).push(w.a);
  });
  return g;
}

// DFS
function hasPath(g,start,target,visited=new Set()){
  if(start===target) return true;
  visited.add(start);

  for(let next of g.get(start)){
    if(!visited.has(next)){
      if(hasPath(g,next,target,visited)) return true;
    }
  }
  return false;
}

// CEK RANGKAIAN REAL
function checkCircuit(){
  let g=buildGraph();

  let akiPlus, akiMin, lampNodes=[], saklarOn=false, lampComp;

  document.querySelectorAll(".component").forEach(c=>{
    if(c.innerText.includes("AKI")){
      akiPlus=c.children[0];
      akiMin=c.children[1];
    }
    if(c.innerText.includes("Lampu")){
      lampNodes=[c.children[0],c.children[1]];
      lampComp=c;
    }
    if(c.classList.contains("switch") && c.classList.contains("on")){
      saklarOn=true;
    }
  });

  if(!akiPlus || !akiMin || lampNodes.length<2) return;

  let path1=hasPath(g,akiPlus,lampNodes[0]);
  let path2=hasPath(g,lampNodes[1],akiMin);

  if(path1 && path2 && saklarOn){
    lampComp.classList.add("lamp-on");
  }else{
    lampComp.classList.remove("lamp-on");
  }
}
</script>

</body>
</html>
